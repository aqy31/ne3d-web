<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض التفاعلي - تتبع مكاني كامل (WebXR)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background-color: #111; user-select: none; touch-action: none; }
        canvas { display: block; }
        
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1a1a1a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        #loading-screen h1 { margin: 0 0 10px 0; color: #f39c12; }
        #loading-text { font-size: 1.2rem; }

        /* حاوية واجهة المستخدم للواقع المعزز */
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;
        }

        #info-panel {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); color: white; padding: 25px;
            border-radius: 12px; display: none; text-align: center;
            min-width: 300px; box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto; /* السماح بالنقر على الزر داخل الواجهة */
        }
        #info-panel h2 { margin-top: 0; color: #f39c12; }
        #close-btn {
            background: #e74c3c; color: white; border: none; padding: 10px 20px;
            margin-top: 15px; cursor: pointer; border-radius: 5px; font-weight: bold;
        }
        
        /* علامة تصويب لسهولة النقر في الـ AR */
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 8px; height: 8px; background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1>جاري تجهيز المتحف</h1>
        <div id="loading-text">0%</div>
    </div>

    <!-- هذه الحاوية ضرورية لكي تظهر النصوص فوق الواقع المعزز -->
    <div id="ui-overlay">
        <div id="crosshair"></div>
        <div id="info-panel">
            <h2 id="piece-name">اسم القطعة</h2>
            <p id="piece-desc">المعلومات</p>
            <button id="close-btn">إغلاق</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { ARButton } from 'three/addons/webxr/ARButton.js'; // استدعاء زر الـ WebXR

        const scene = new THREE.Scene();

        // إعداد الكاميرا
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5); // الارتفاع الافتراضي قبل الـ AR

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // alpha: true ضرورية لشفافية الكاميرا
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        // 1. تفعيل تقنية WebXR للحركة المكانية الكاملة!
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 2. إضافة زر الـ AR مع دمج واجهة الـ HTML (DOM Overlay) لتظهر المعلومات أثناء التجول
        document.body.appendChild(ARButton.createButton(renderer, {
            requiredFeatures: ['hit-test'],
            optionalFeatures: ['dom-overlay'],
            domOverlay: { root: document.getElementById('ui-overlay') }
        }));

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // للتحكم بالماوس عند الفتح من اللابتوب
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0);
        controls.update();

        // تحميل المبنى
        const loader = new GLTFLoader();
        let myMuseum;
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loading-text');

        loader.load('my_museum.glb', 
            function (gltf) {
                myMuseum = gltf.scene;
                
                // ملاحظة هامة: في الـ AR، يجب أن نجعل المبنى أمامنا وقريباً من الأرض
                myMuseum.position.set(0, -1.6, -2); 
                scene.add(myMuseum);

                loadingScreen.style.opacity = '0';
                setTimeout(() => { loadingScreen.style.display = 'none'; }, 500);
            }, 
            function (xhr) {
                if (xhr.total > 0) loadingText.innerText = Math.round((xhr.loaded / xhr.total) * 100) + '%';
            }
        );

        const piecesInfo = {
            "Piece_1": { title: "القطعة الأولى", desc: "هذا المجسم يعود للعصر القديم..." },
            "Piece_2": { title: "القطعة الثانية", desc: "جرة فخارية مزخرفة بالخط المسماري..." },
            "Piece_3": { title: "القطعة الثالثة", desc: "لوح طيني يوثق التجارة..." }
        };

        const raycaster = new THREE.Raycaster();
        const tempMatrix = new THREE.Matrix4();

        // 3. إعداد متحكم الـ XR للتعرف على النقر (Tap) في شاشة الموبايل أثناء المشي
        const controller = renderer.xr.getController(0);
        controller.addEventListener('select', onSelect);
        scene.add(controller);

        function onSelect() {
            if (!myMuseum) return;

            // في وضع الـ AR، نطلق الشعاع من منتصف شاشة الهاتف نحو العالم الافتراضي
            tempMatrix.identity().extractRotation(controller.matrixWorld);
            raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

            const intersects = raycaster.intersectObject(myMuseum, true);

            if (intersects.length > 0) {
                let clickedObject = intersects[0].object;
                let targetName = null;

                let currentObj = clickedObject;
                while (currentObj) {
                    if (piecesInfo[currentObj.name]) {
                        targetName = currentObj.name;
                        break;
                    }
                    currentObj = currentObj.parent;
                }

                if (targetName) {
                    document.getElementById('piece-name').innerText = piecesInfo[targetName].title;
                    document.getElementById('piece-desc').innerText = piecesInfo[targetName].desc;
                    document.getElementById('info-panel').style.display = 'block';
                }
            }
        }

        // إغلاق لوحة المعلومات
        document.getElementById('close-btn').addEventListener('click', () => {
            document.getElementById('info-panel').style.display = 'none';
        });

        renderer.setAnimationLoop(function () {
            if (!renderer.xr.isPresenting) {
                controls.update(); // تفعيل السحب العادي إذا لم نكن في وضع الـ AR
            }
            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض التفاعلي - دعم حركة الهاتف</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background-color: #111; }
        canvas { display: block; }
        
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1a1a1a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        #loading-screen h1 { margin: 0 0 10px 0; color: #f39c12; }
        #loading-text { font-size: 1.2rem; }

        #info-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); color: white; padding: 25px;
            border-radius: 12px; display: none; text-align: center;
            min-width: 300px; z-index: 10; box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        #info-panel h2 { margin-top: 0; color: #f39c12; }
        #close-btn {
            background: #e74c3c; color: white; border: none; padding: 10px 20px;
            margin-top: 15px; cursor: pointer; border-radius: 5px; font-weight: bold;
        }

        #gyro-btn {
            position: absolute; top: 20px; right: 20px;
            background: #2ecc71; color: white; border: none;
            padding: 12px 20px; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; z-index: 100; box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }
        #gyro-btn:hover { background: #27ae60; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div id="loading-screen">
        <h1>جاري تجهيز المتحف</h1>
        <div id="loading-text">0%</div>
    </div>

    <!-- الزر الأخضر لتفعيل الحساسات -->
    <button id="gyro-btn">📱 تفعيل حركة الهاتف</button>

    <div id="info-panel">
        <h2 id="piece-name">اسم القطعة</h2>
        <p id="piece-desc">المعلومات</p>
        <button id="close-btn">تراجع</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- كلاس برمجة الجيروسكوب المدمج (لكي لا نعتمد على ملفات خارجية قد تُحذف) ---
        const _zee = new THREE.Vector3( 0, 0, 1 );
        const _euler = new THREE.Euler();
        const _q0 = new THREE.Quaternion();
        const _q1 = new THREE.Quaternion( - Math.sqrt( 0.5 ), 0, 0, Math.sqrt( 0.5 ) );

        class CustomDeviceOrientation {
            constructor( object ) {
                this.object = object;
                this.object.rotation.reorder( 'YXZ' );
                this.enabled = true;
                this.deviceOrientation = {};
                this.screenOrientation = 0;
                
                this.onDeviceOrientationChangeEvent = ( event ) => { this.deviceOrientation = event; };
                this.onScreenOrientationChangeEvent = () => { this.screenOrientation = window.orientation || 0; };
                
                this.connect = () => {
                    this.onScreenOrientationChangeEvent();
                    window.addEventListener( 'orientationchange', this.onScreenOrientationChangeEvent );
                    window.addEventListener( 'deviceorientation', this.onDeviceOrientationChangeEvent );
                    this.enabled = true;
                };
                
                this.update = () => {
                    if ( !this.enabled ) return;
                    const device = this.deviceOrientation;
                    if ( device ) {
                        const alpha = device.alpha ? THREE.MathUtils.degToRad( device.alpha ) : 0;
                        const beta = device.beta ? THREE.MathUtils.degToRad( device.beta ) : 0;
                        const gamma = device.gamma ? THREE.MathUtils.degToRad( device.gamma ) : 0;
                        const orient = this.screenOrientation ? THREE.MathUtils.degToRad( this.screenOrientation ) : 0;
                        
                        _euler.set( beta, alpha, - gamma, 'YXZ' );
                        this.object.quaternion.setFromEuler( _euler );
                        this.object.quaternion.multiply( _q1 );
                        this.object.quaternion.multiply( _q0.setFromAxisAngle( _zee, - orient ) );
                    }
                };
                this.connect();
            }
        }
        // -------------------------------------------------------------

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 10); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0);
        controls.update();

        let gyroControls = null;
        let useGyro = false;
        let savedCameraPos = new THREE.Vector3();
        let savedControlsTarget = new THREE.Vector3();
        let isZoomedIn = false;

        const gyroBtn = document.getElementById('gyro-btn');
        gyroBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            activateGyro();
                        } else {
                            alert('عذراً، يجب الموافقة على إذن الحركة لتفعيل الميزة.');
                        }
                    })
                    .catch(console.error);
            } else {
                activateGyro();
            }
        });

        function activateGyro() {
            gyroControls = new CustomDeviceOrientation(camera); // استخدام الكلاس المدمج
            useGyro = true;
            controls.enabled = false;
            gyroBtn.style.display = 'none';
        }

        const loader = new GLTFLoader();
        let myMuseum;
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loading-text');

        loader.load(
            'my_museum.glb', 
            function (gltf) {
                myMuseum = gltf.scene;
                scene.add(myMuseum);
                loadingScreen.style.opacity = '0';
                setTimeout(() => { loadingScreen.style.display = 'none'; }, 500);
            }, 
            function (xhr) {
                if (xhr.total > 0) {
                    loadingText.innerText = Math.round((xhr.loaded / xhr.total) * 100) + '%';
                }
            }, 
            function (error) {
                console.error(error);
                loadingText.innerText = 'فشل التحميل!';
            }
        );

        const piecesInfo = {
            "Piece_1": { title: "القطعة الأولى", desc: "هذا المجسم يعود للعصر القديم..." },
            "Piece_2": { title: "القطعة الثانية", desc: "جرة فخارية مزخرفة بالخط المسماري..." },
            "Piece_3": { title: "القطعة الثالثة", desc: "لوح طيني يوثق التجارة..." }
        };

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (isZoomedIn) return;
            if(event.target.id === 'gyro-btn') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            if (myMuseum) {
                const intersects = raycaster.intersectObject(myMuseum, true);

                if (intersects.length > 0) {
                    let clickedObject = intersects[0].object;
                    let targetName = null;
                    let finalTargetObject = null;

                    let currentObj = clickedObject;
                    while (currentObj) {
                        if (piecesInfo[currentObj.name]) {
                            targetName = currentObj.name;
                            finalTargetObject = currentObj;
                            break;
                        }
                        currentObj = currentObj.parent;
                    }

                    if (targetName && finalTargetObject) {
                        isZoomedIn = true;
                        savedCameraPos.copy(camera.position);
                        savedControlsTarget.copy(controls.target);

                        const piecePosition = new THREE.Vector3();
                        finalTargetObject.getWorldPosition(piecePosition);
                        const cameraOffset = new THREE.Vector3(0, 0.2, 1.5); 
                        const newCameraPos = piecePosition.clone().add(cameraOffset);

                        if (useGyro) {
                            gsap.to(camera.position, {
                                x: newCameraPos.x, y: newCameraPos.y, z: newCameraPos.z,
                                duration: 1.5, ease: "power2.inOut",
                                onComplete: function() {
                                    document.getElementById('piece-name').innerText = piecesInfo[targetName].title;
                                    document.getElementById('piece-desc').innerText = piecesInfo[targetName].desc;
                                    document.getElementById('info-panel').style.display = 'block';
                                }
                            });
                        } else {
                            gsap.to(camera.position, {
                                x: newCameraPos.x, y: newCameraPos.y, z: newCameraPos.z,
                                duration: 1.5, ease: "power2.inOut"
                            });

                            gsap.to(controls.target, {
                                x: piecePosition.x, y: piecePosition.y, z: piecePosition.z,
                                duration: 1.5, ease: "power2.inOut",
                                onUpdate: function() { controls.update(); },
                                onComplete: function() {
                                    document.getElementById('piece-name').innerText = piecesInfo[targetName].title;
                                    document.getElementById('piece-desc').innerText = piecesInfo[targetName].desc;
                                    document.getElementById('info-panel').style.display = 'block';
                                }
                            });
                        }
                    }
                }
            }
        });

        document.getElementById('close-btn').addEventListener('click', () => {
            document.getElementById('info-panel').style.display = 'none';
            
            gsap.to(camera.position, {
                x: savedCameraPos.x, y: savedCameraPos.y, z: savedCameraPos.z,
                duration: 1.5, ease: "power2.inOut",
                onComplete: function() { isZoomedIn = false; }
            });

            if (!useGyro) {
                gsap.to(controls.target, {
                    x: savedControlsTarget.x, y: savedControlsTarget.y, z: savedControlsTarget.z,
                    duration: 1.5, ease: "power2.inOut",
                    onUpdate: function() { controls.update(); }
                });
            }
        });

        renderer.setAnimationLoop(function () {
            if (useGyro && gyroControls) {
                gyroControls.update();
            } else {
                controls.update();
            }
            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

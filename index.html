<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض التفاعلي - وضع الفحص الاحترافي</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background-color: #111; user-select: none; touch-action: none; }
        canvas { display: block; }
        
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1a1a1a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        #loading-screen h1 { margin: 0 0 10px 0; color: #f39c12; }
        #loading-text { font-size: 1.2rem; }

        #ui-container { transition: opacity 0.3s ease; }

        #info-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); color: white; padding: 25px;
            border-radius: 12px; display: none; text-align: center;
            min-width: 300px; z-index: 100; box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        #info-panel h2 { margin-top: 0; color: #f39c12; }
        #close-btn {
            background: #e74c3c; color: white; border: none; padding: 10px 20px;
            margin-top: 15px; cursor: pointer; border-radius: 5px; font-weight: bold;
        }

        #gyro-btn {
            position: absolute; top: 20px; right: 20px;
            background: #2ecc71; color: white; border: none;
            padding: 12px 20px; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; z-index: 100; box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }

        #joystick-zone {
            position: absolute; bottom: 30px; left: 30px;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.4);
            z-index: 100; display: flex; justify-content: center; align-items: center;
        }
        #joystick-knob {
            width: 50px; height: 50px; background: rgba(255, 255, 255, 0.8);
            border-radius: 50%; position: absolute; pointer-events: none;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 6px; height: 6px; background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%; pointer-events: none; z-index: 5;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div id="loading-screen">
        <h1>جاري تجهيز المتحف</h1>
        <div id="loading-text">0%</div>
    </div>

    <div id="ui-container">
        <button id="gyro-btn">📱 تفعيل حركة الهاتف</button>
        <div id="crosshair"></div>
        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>
    </div>

    <div id="info-panel">
        <h2 id="piece-name">اسم القطعة</h2>
        <p id="piece-desc">المعلومات</p>
        <button id="close-btn">إغلاق وتراجع</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const _zee = new THREE.Vector3( 0, 0, 1 );
        const _euler = new THREE.Euler();
        const _q0 = new THREE.Quaternion();
        const _q1 = new THREE.Quaternion( - Math.sqrt( 0.5 ), 0, 0, Math.sqrt( 0.5 ) );

        class CustomDeviceOrientation {
            constructor( object ) {
                this.object = object;
                this.object.rotation.reorder( 'YXZ' );
                this.enabled = true;
                this.deviceOrientation = {};
                this.screenOrientation = 0;
                this.onDeviceOrientationChangeEvent = ( event ) => { this.deviceOrientation = event; };
                this.onScreenOrientationChangeEvent = () => { this.screenOrientation = window.orientation || 0; };
                this.connect = () => {
                    this.onScreenOrientationChangeEvent();
                    window.addEventListener( 'orientationchange', this.onScreenOrientationChangeEvent );
                    window.addEventListener( 'deviceorientation', this.onDeviceOrientationChangeEvent );
                };
                this.update = () => {
                    if ( !this.enabled ) return;
                    const device = this.deviceOrientation;
                    if ( device ) {
                        const alpha = device.alpha ? THREE.MathUtils.degToRad( device.alpha ) : 0;
                        const beta = device.beta ? THREE.MathUtils.degToRad( device.beta ) : 0;
                        const gamma = device.gamma ? THREE.MathUtils.degToRad( device.gamma ) : 0;
                        const orient = this.screenOrientation ? THREE.MathUtils.degToRad( this.screenOrientation ) : 0;
                        _euler.set( beta, alpha, - gamma, 'YXZ' );
                        this.object.quaternion.setFromEuler( _euler );
                        this.object.quaternion.multiply( _q1 );
                        this.object.quaternion.multiply( _q0.setFromAxisAngle( _zee, - orient ) );
                    }
                };
                this.connect();
            }
        }

        const scene = new THREE.Scene();

        const cameraRig = new THREE.Group();
        cameraRig.position.set(0, 1.6, 5);
        scene.add(cameraRig);

        const yawObject = new THREE.Group();
        cameraRig.add(yawObject);

        const pitchObject = new THREE.Group();
        yawObject.add(pitchObject);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        pitchObject.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        let gyroControls = null;
        let useGyro = false;

        const gyroBtn = document.getElementById('gyro-btn');
        gyroBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(permissionState => {
                    if (permissionState === 'granted') activateGyro();
                }).catch(console.error);
            } else {
                activateGyro();
            }
        });

        function activateGyro() {
            gyroControls = new CustomDeviceOrientation(camera);
            useGyro = true;
            gyroBtn.style.display = 'none';
        }

        let isDragging = false;
        let previousTouch = { x: 0, y: 0 };
        let dragDistance = 0;
        let isZoomedIn = false;

        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('#ui-container') || e.target.closest('#info-panel')) return;
            isDragging = true;
            dragDistance = 0;
            previousTouch.x = e.clientX;
            previousTouch.y = e.clientY;
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - previousTouch.x;
            const deltaY = e.clientY - previousTouch.y;
            dragDistance += Math.abs(deltaX) + Math.abs(deltaY);

            yawObject.rotation.y -= deltaX * 0.004;
            pitchObject.rotation.x -= deltaY * 0.004;
            pitchObject.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitchObject.rotation.x));

            previousTouch.x = e.clientX;
            previousTouch.y = e.clientY;
        });

        window.addEventListener('pointerup', (e) => {
            isDragging = false;
            if (dragDistance < 10 && !isZoomedIn && !e.target.closest('#ui-container')) {
                fireRaycaster(e.clientX, e.clientY);
            }
        });

        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let isJoystickActive = false;
        let joyMoveX = 0, joyMoveY = 0;
        let centerX, centerY;

        joystickZone.addEventListener('touchstart', (e) => {
            if(isZoomedIn) return;
            isJoystickActive = true;
            const rect = joystickZone.getBoundingClientRect();
            centerX = rect.left + rect.width / 2;
            centerY = rect.top + rect.height / 2;
            updateJoystick(e.touches[0]);
        });

        joystickZone.addEventListener('touchmove', (e) => {
            if(!isJoystickActive || isZoomedIn) return;
            e.preventDefault();
            updateJoystick(e.touches[0]);
        });

        joystickZone.addEventListener('touchend', () => {
            isJoystickActive = false;
            joystickKnob.style.transform = `translate(-50%, -50%)`;
            joyMoveX = 0; joyMoveY = 0;
        });

        function updateJoystick(touch) {
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const maxDist = 40;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist > maxDist) { dx = (dx/dist)*maxDist; dy = (dy/dist)*maxDist; }
            joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            joyMoveX = dx / maxDist; 
            joyMoveY = dy / maxDist; 
        }

        const loader = new GLTFLoader();
        let myMuseum;
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loading-text');

        loader.load('my_museum.glb', 
            function (gltf) {
                myMuseum = gltf.scene;
                scene.add(myMuseum);
                loadingScreen.style.opacity = '0';
                setTimeout(() => { loadingScreen.style.display = 'none'; }, 500);
            }, 
            function (xhr) { if (xhr.total > 0) loadingText.innerText = Math.round((xhr.loaded / xhr.total) * 100) + '%'; }
        );

        const piecesInfo = {
            "Piece_1": { title: "القطعة الأولى", desc: "هذا المجسم يعود للعصر القديم..." },
            "Piece_2": { title: "القطعة الثانية", desc: "جرة فخارية مزخرفة بالخط المسماري..." },
            "Piece_3": { title: "القطعة الثالثة", desc: "لوح طيني يوثق التجارة..." }
        };

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        // متغيرات لحفظ حالة الكاميرا للعودة إليها بدقة
        let savedCameraRigPos = new THREE.Vector3();
        let savedYaw = 0;
        let savedPitch = 0;
        let savedCameraRigQuat = new THREE.Quaternion();

        function fireRaycaster(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            if (myMuseum) {
                const intersects = raycaster.intersectObject(myMuseum, true);
                if (intersects.length > 0) {
                    let clickedObject = intersects[0].object;
                    let targetName = null;
                    let finalTargetObject = null;

                    let currentObj = clickedObject;
                    while (currentObj) {
                        if (piecesInfo[currentObj.name]) {
                            targetName = currentObj.name;
                            finalTargetObject = currentObj;
                            break;
                        }
                        currentObj = currentObj.parent;
                    }

                    if (targetName && finalTargetObject) {
                        isZoomedIn = true;
                        
                        // حفظ الموقع والدوران الحالي للعودة إليه
                        savedCameraRigPos.copy(cameraRig.position);
                        savedYaw = yawObject.rotation.y;
                        savedPitch = pitchObject.rotation.x;
                        savedCameraRigQuat.copy(cameraRig.quaternion);
                        
                        document.getElementById('ui-container').style.opacity = '0';
                        setTimeout(() => { document.getElementById('ui-container').style.pointerEvents = 'none'; }, 300);

                        document.getElementById('piece-name').innerText = piecesInfo[targetName].title;
                        document.getElementById('piece-desc').innerText = piecesInfo[targetName].desc;
                        document.getElementById('info-panel').style.display = 'block';

                        // --- السحر هنا: حساب الصندوق المحيط (Bounding Box) ---
                        // هذا الكود يحدد مركز المجسم الحقيقي ويتجاهل نقطة الارتكاز (Pivot)
                        const box = new THREE.Box3().setFromObject(finalTargetObject);
                        const center = new THREE.Vector3();
                        box.getCenter(center);
                        
                        const size = new THREE.Vector3();
                        box.getSize(size);
                        // أخذ أكبر بُعد للمجسم لتحديد مسافة الكاميرا المثالية
                        const maxDim = Math.max(size.x, size.y, size.z); 
                        
                        // تحديد الموقع المثالي: الكاميرا ترتفع قليلاً وتتراجع للخلف بمسافة تتناسب مع حجم القطعة
                        const idealDistance = maxDim * 1.5; 
                        const targetPos = new THREE.Vector3(center.x, center.y + (maxDim * 0.2), center.z + idealDistance);

                        // إنشاء كائن وهمي لمعرفة زاوية النظر المثالية نحو المركز الهندسي للقطعة
                        const dummyCam = new THREE.Object3D();
                        dummyCam.position.copy(targetPos);
                        dummyCam.lookAt(center);
                        const targetQuat = dummyCam.quaternion.clone();

                        const startQuat = cameraRig.quaternion.clone();
                        const proxy = { t: 0 };

                        // تحريك موقع الكاميرا
                        gsap.to(cameraRig.position, {
                            x: targetPos.x, y: targetPos.y, z: targetPos.z,
                            duration: 1.5, ease: "power2.inOut"
                        });

                        // تصفير حركة الرأس اليدوية تدريجياً لكي نستلم التحكم الكامل
                        gsap.to(yawObject.rotation, { y: 0, duration: 1.5, ease: "power2.inOut" });
                        gsap.to(pitchObject.rotation, { x: 0, duration: 1.5, ease: "power2.inOut" });

                        // توجيه الكاميرا بدقة سينمائية نحو مركز القطعة
                        gsap.to(proxy, {
                            t: 1, duration: 1.5, ease: "power2.inOut",
                            onUpdate: () => {
                                cameraRig.quaternion.slerpQuaternions(startQuat, targetQuat, proxy.t);
                            }
                        });
                    }
                }
            }
        }

        document.getElementById('close-btn').addEventListener('click', () => {
            document.getElementById('info-panel').style.display = 'none';
            document.getElementById('ui-container').style.pointerEvents = 'auto';
            document.getElementById('ui-container').style.opacity = '1';

            const proxy = { t: 0 };
            const currentQuat = cameraRig.quaternion.clone();

            // إرجاع كل شيء للمكان والزاوية الأصلية
            gsap.to(cameraRig.position, {
                x: savedCameraRigPos.x, y: savedCameraRigPos.y, z: savedCameraRigPos.z,
                duration: 1.5, ease: "power2.inOut",
                onComplete: () => { isZoomedIn = false; }
            });

            gsap.to(yawObject.rotation, { y: savedYaw, duration: 1.5, ease: "power2.inOut" });
            gsap.to(pitchObject.rotation, { x: savedPitch, duration: 1.5, ease: "power2.inOut" });

            gsap.to(proxy, {
                t: 1, duration: 1.5, ease: "power2.inOut",
                onUpdate: () => {
                    cameraRig.quaternion.slerpQuaternions(currentQuat, savedCameraRigQuat, proxy.t);
                }
            });
        });

        const moveSpeed = 0.05;
        renderer.setAnimationLoop(function () {
            if (useGyro && gyroControls) gyroControls.update();

            if (isJoystickActive && !isZoomedIn) {
                const direction = new THREE.Vector3(0, 0, -1);
                direction.applyQuaternion(yawObject.quaternion).normalize();

                const right = new THREE.Vector3(1, 0, 0);
                right.applyQuaternion(yawObject.quaternion).normalize();

                cameraRig.position.addScaledVector(direction, -joyMoveY * moveSpeed);
                cameraRig.position.addScaledVector(right, joyMoveX * moveSpeed);
            }

            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
